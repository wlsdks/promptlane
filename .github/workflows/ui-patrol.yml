name: ui-patrol

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  ui-patrol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run UI patrol
        env:
          SCREENSHOT_DIR: ${{ runner.temp }}/prompt-coach-ui-patrol
        run: pnpm ui-patrol

      - name: Upload UI patrol screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-patrol-screenshots
          path: ${{ runner.temp }}/prompt-coach-ui-patrol
          if-no-files-found: warn
